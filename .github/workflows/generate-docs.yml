name: Generate Naive UI Docs

on:
  push:
    branches:
      - main
    paths-ignore:
      - "references"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clone naive-ui
        run: git clone --depth 1 https://github.com/tusen-ai/naive-ui.git naive

      - name: Extract docs
        run: npx tsx scripts/extract-docs.ts ./naive ./references

      - name: Run tests
        run: npx vitest run

      - name: Commit and Push to main
        run: |
          # 配置 Git 机器人身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 暂存 references 文件夹的变更
          git add references/

          # 检查是否有文档更新,只有在有变动时才提交,防止无变动时报错导致工作流失败
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update naive-ui components documentation [skip ci]"
            git push origin main
          else
            echo "没有检测到文档变化,跳过提交。"
          fi
